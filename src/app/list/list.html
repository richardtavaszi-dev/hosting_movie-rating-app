<div class="p-3">
  <h3>Filmek listája</h3>
  <table class="table mt-3">
    <thead>
      <tr>
        <th>Borító</th>
        <th>Cím</th>
        <th>Műfaj</th>
        <th>Évszám</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let m of movieService.movies; let i = index">
        
        <td>
  <img [src]="m.imageUrl ? m.imageUrl : 'https://images.unsplash.com/photo-1485846234645-a62644f84728?w=100'" 
       alt="Borító" 
       style="width: 50px; height: 75px; object-fit: cover; border-radius: 5px;">
</td>
        
        <td>{{ m.title }}</td>
        <td>{{ m.genre }}</td>
        <td>{{ m.year }}</td>
      </tr>
    </tbody>
