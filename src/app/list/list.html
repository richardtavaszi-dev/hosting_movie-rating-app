<div class="p-3">
  <h3>Filmek listája</h3>
  <table class="table mt-3">
    <thead>
      <tr>
        <th>Borító</th>
        <th>Cím</th>
        <th>Műfaj</th>
        <th>Évszám</th>
        <th>Átlagértékelés</th>
        <th>Értékelések</th>
        <th>Műveletek</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let m of movieService.movies;">

        <td>
          <img
            [src]="m.imageUrl || 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQv3jDP1-DeVYTgj5FbHMzR59fSnSRsns0bVlTDOqTrlQ&s'"
            style="width: 50px; height: 75px;">
        </td>

        <td>{{ m.title }}</td>
        <td>{{ m.genre }}</td>
        <td>{{ m.year }}</td>
        <td>{{m.avgRating}}</td>
        <td>{{m.rating}}</td>
        <td>
          <button class="btn btn-primary" (click)="selectedMovie = m">Értékelés</button>
        </td>
      </tr>
    </tbody>
