<div class="container-fluid">
    <div class="container px-4">
        <div class="row gx-5">
            <div class="col">
                <h3>Filmek Értékelése</h3>
                <div class="p-3">
                    <form class="row g-3">
                        <div class="col-6">
                            <h5>Új film hozzáadása</h5>
                            <br>
                            <label class="form-label">Cím</label>
                            <input type="text" class="form-control" id="cim" placeholder="Film címe" [(ngModel)]="movie.title">
                        </div>
                        <div class="col-12">
                            <label class="form-label">Műfaj</label>
                            <input type="text" class="form-control" id="mufaj" placeholder="Műfaj" [(ngModel)]="movie.genre">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Évszám</label>
                            <input type="number" class="form-control" id="ev" placeholder="Évszám" [(ngModel)]="movie.year">
                        </div>
                        <div class="col-md-12">
                            <label class="form-label">Kép URL (opcionális)</label>
                            <input type="url" class="form-control" id="jpgurl"
                                placeholder="https://movies.com/picture.jpg" [(ngModel)]="movie.imageUrl">
                        </div>
                        <div class="col-12">
                            <button (click)="create()" class="btn btn-primary">Film hozzáadása</button>
                        </div>

                    </form>
                </div>
            </div>
            <div class="col">
                <div class="p-3">
                    <h5>Filmek listája</h5>
                </div>
                <table class="table">
            <thead>
            <tr>
      <th scope="col">Borító</th>
      <th scope="col">Cím</th>
      <th scope="col">Műfaj</th>
      <th scope="col">Évszám</th>
      <th scope="col">Átlagértékelés</th>
      <th scope="col">Értékelések száma</th>
      <th scope="col">Műveletek</th>
    </tr>
            </thead>
            <tbody>
    <tr>
      <th scope="row">1.Filmkép</th>
      <td>Életrevalók</td>
      <td>Életrajz</td>
      <td>2000</td>
      <td>8.6</td>
      <td>11</td>
      <td><button type="button" class="btn btn-info btn-sm">Értékelés írása</button></td>
    </tr>
    <tr>
      <th scope="row">2.Filmkép</th>
      <td>Superman</td>
      <td>Akció</td>
      <td>2010</td>
      <td>8.6</td>
      <td>11</td>
      <td><button type="button" class="btn btn-info btn-sm">Értékelés írása</button></td>
    </tr>
            </tbody>
            </table>


            </div>
        </div>
    </div>
</div>
