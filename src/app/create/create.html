<div class="p-3">
  <form class="row g-3">
    <div class="col-12">
      <h5>Új film hozzáadása</h5>
      <br>
      <label class="form-label">Cím <span class="text-danger" title="Cím megadása kötelező!!">*</span></label>
      <input type="text" class="form-control" [(ngModel)]="movie.title" name="title" placeholder="Film címe">
    </div>

    <div class="col-12">
      <label class="form-label">Műfaj <span class="text-danger" title="Műfaj megadása kötelező!!">*</span></label>
      <input type="text" class="form-control" [(ngModel)]="movie.genre" name="genre" placeholder="Műfaj">
    </div>

    <div class="col-12">
      <label class="form-label">Évszám <span class="text-danger" title="Évszám megadása kötelező!!">*</span></label>
      <input type="number" class="form-control" [(ngModel)]="movie.year" name="year" placeholder="Évszám">
    </div>

    <div class="col-12">
      <label class="form-label">Kép URL (választható)</label>
      <input type="text" class="form-control" [(ngModel)]="movie.imageUrl" name="url"
        placeholder="http://movie.com/image.jpg">
    </div>

    <div class="col-12 mt-3">
      <button type="button" class="btn btn-primary" (click)="create()" [disabled]="!isFormValid">Film
        hozzáadása</button>
    </div>
  </form>
</div>
