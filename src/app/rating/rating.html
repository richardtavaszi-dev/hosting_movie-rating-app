<div class="card mt-4 border-warning shadow">
  <div class="card-header bg-warning text-dark">
    <h5 class="mb-0">Értékelés írása: <strong>{{ movie.title }}</strong></h5>
  </div>
  <div class="card-body">
    <form class="row g-3">
      <div class="col-md-12">
        <label class="form-label">Értékelő neve <span class="text-danger"
            title="Név megadása kötelező!!">*</span></label>
        <input type="text" class="form-control" [(ngModel)]="newRating.name" name="name"
          placeholder="Írd be a neved...">
      </div>
      <div class="col-12">

        <div class="col-md-12 mt-2 mb-2">
          <label class="form-label">Pontszám (1-10) <span class="text-danger" title="Értékelés 1-10 között!">*</span></label>
          <input type="number" class="form-control" [(ngModel)]="newRating.score" name="score" min="1" max="10">
        </div>
        <label class="form-label">
          Értékelés szövege <span class="text-danger" title="Min. 50 karakter!">*</span>

        </label>
        <textarea class="form-control" [(ngModel)]="newRating.text" name="text" rows="4"
          placeholder="Írd le a véleményed a filmről..."></textarea>
      </div>

      <div class="col-12 mt-2">
        <button type="button" class="btn btn-success me-2" (click)="saveRating()" [disabled]="!isReviewValid">
          Értékelés beküldése
        </button>
      </div>
