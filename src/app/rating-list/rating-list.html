<div class="card mt-3 border-primary shadow-sm">
  <div class="card-header bg-primary text-white">
    <h5 class="mb-0">Eddigi értékelések: {{ movie.title }}</h5>
  </div>

  <div class="card-body p-0">
    <div class="p-3" *ngIf="!movie.rating || movie.rating.length === 0">
      <div class="alert alert-warning mb-0">
        Még nem érkezett értékelés!
      </div>
    </div>

    <ul class="list-group list-group-flush" *ngIf="movie.rating && movie.rating.length > 0">

      <li class="list-group-item" *ngFor="let r of movie.rating; let i = index">

        <div class="my-flex-style">
          <strong>{{ r.name }}</strong>
          <span class="my-badge-style">{{ r.score }} pont</span>
        </div>

        <p class="my-text-style">"{{ r.text }}"</p>
      </li>

    </ul>
  </div>
</div>
